targets:
  $default:
    builders:
      # ─────────────────────────────────────────────────────────────────────
      # JSON SERIALIZABLE
      # ─────────────────────────────────────────────────────────────────────
      json_serializable:
        generate_for:
          include:
            - lib/**
          exclude:
            - "**/*.g.dart"
            - "**/*.freezed.dart"
            - lib/gen/**
        options:
          # API trả snake_case → tự map sang camelCase, không cần @JsonKey thủ công
          # Override cụ thể: @JsonKey(name: 'custom_key')
          field_rename: snake

          # Bắt buộc true khi dùng generic model: ApiResponse<T>, PagedData<T>...
          generic_argument_factories: true

          # Bắt buộc explicit toJson() trong nested object
          explicit_to_json: true

          # Không gửi field null lên server, override per-field: @JsonKey(includeIfNull: true)
          include_if_null: false

          # Throw CheckedFromJsonException khi type không khớp thay vì runtime crash
          checked: true

          # type-safe Map<String, dynamic> thay vì Map<dynamic, dynamic>
          any_map: false

          # API hay trả field thừa → false để không lỗi
          disallow_unrecognized_keys: false

          # Xử lý tất cả field kể cả chưa annotate
          ignore_unannotated: false

      # ─────────────────────────────────────────────────────────────────────
      # FREEZED
      # ─────────────────────────────────────────────────────────────────────
      freezed:
        generate_for:
          include:
            - lib/**
          exclude:
            - "**/*.g.dart"
            - "**/*.freezed.dart"
            - lib/gen/**
        options:
          # Discriminator field cho sealed/union class khi dùng JSON
          union_key: type

          # Nhất quán với field_rename: snake
          union_value_case: snake

      # ─────────────────────────────────────────────────────────────────────
      # INJECTABLE
      # ─────────────────────────────────────────────────────────────────────
      injectable_generator:injectable_builder:
        generate_for:
          include:
            - lib/**
          exclude:
            - "**/*.g.dart"
            - "**/*.freezed.dart"
            - lib/gen/**
        options:
          # Bắt buộc annotate tường minh:
          #   @LazySingleton  → repository, service, singleton stateful
          #   @injectable     → cubit, bloc (new instance mỗi lần)
          #   @Singleton      → eager singleton (init ngay lúc boot)
          auto_register: false

      # ─────────────────────────────────────────────────────────────────────
      # RETROFIT — không giới hạn generate_for, tự skip file không có @RestApi
      # ─────────────────────────────────────────────────────────────────────
      retrofit_generator:retrofit_generator:
        generate_for:
          - lib/**/data/services/**.dart
          - lib/**/data/datasources/**.dart
          - lib/**/services/**.dart

      # ─────────────────────────────────────────────────────────────────────
      # RIVERPOD GENERATOR — loại trừ generated files để giảm inputs
      # ─────────────────────────────────────────────────────────────────────
      riverpod_generator:
        generate_for:
          include:
            - lib/**
          exclude:
            - "**/*.g.dart"
            - "**/*.freezed.dart"
            - lib/gen/**

      # ─────────────────────────────────────────────────────────────────────
      # GRAPHQL CODEGEN — sinh class type-safe từ .graphql files
      # ─────────────────────────────────────────────────────────────────────
      graphql_codegen:
        generate_for:
          - lib/features/example/graphql_codegen_demo/**
        options:
          scalars:
            ID:
              type: String
            DateTime:
              type: DateTime
              fromJsonFunctionName: DateTime.parse
              toJsonFunctionName: toIso8601String
          clients:
            - graphql_flutter

      # ─────────────────────────────────────────────────────────────────────
      # GO ROUTER BUILDER — 505 → chỉ routes folder (~5 inputs)
      # ─────────────────────────────────────────────────────────────────────
      go_router_builder:
        generate_for:
          - lib/routes/**

      # ─────────────────────────────────────────────────────────────────────
      # SOURCE GEN — suppress lint trong file được generate
      # Analyzer bỏ qua lint check trên *.g.dart → flutter analyze nhanh hơn
      # ─────────────────────────────────────────────────────────────────────
      source_gen:combining_builder:
        options:
          ignore_for_file:
            - type=lint
