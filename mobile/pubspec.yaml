name: flutter_base
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # ─────────────────────── FIREBASE ──────────────────────────
  firebase_core: ^4.2.0
  firebase_remote_config: ^6.1.0
  google_mobile_ads: ^7.0.0
  firebase_analytics: ^12.0.3
  firebase_crashlytics: ^5.0.3
  visibility_detector: ^0.4.0+2

  # ─────────────────────── CORE ──────────────────────────
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^11.0.0
  hooked_bloc: ^1.7.0

  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.0

  get: ^4.7.2
  get_it: ^9.2.0
  injectable: ^2.5.2
  equatable: ^2.0.5
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0
  internet_connection_checker_plus: ^2.5.2
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  go_router: ^17.0.0

  # ─────────────────────── LOGGER & DEBUG ──────────────────────────
  device_info_plus: ^12.2.0
  jwt_decoder: ^2.0.1
  quick_actions: ^1.0.7

  # ─────────────────────── UI & LOCALIZATION ──────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0
  easy_localization: ^3.0.8
  intl: ^0.20.2
  flutter_smart_dialog: ^5.1.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1

  # ─────────────────────── OPTIONAL / COMMENTED ──────────────────────────
  # nb_utils: ^7.2.0
  flutter_local_notifications: ^20.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.0.4
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  loading_animation_widget: ^1.3.0
  open_filex: ^4.7.0
  flutter_image_compress: ^2.4.0
  gallery_saver_plus: ^3.2.9
  permission_handler: ^12.0.1
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  flutter_launcher_icons: ^0.14.4  # ← Dùng khi build icon app
  flutter_native_splash: ^2.4.7
  pin_code_fields: ^9.3.0
  path_provider: ^2.1.5
  envied: ^1.3.1
  path: ^1.9.1
  flutter_screenutil: ^5.9.3
  flutter_cache_manager: ^3.4.1
  retrofit: ^4.9.2
  purchases_flutter: ^10.0.1
  google_maps_flutter: ^2.14.2
  theme_tailor_annotation: ^3.0.1
  toastification: ^2.3.0
  graphql_flutter: ^5.2.1
  # device_preview: ^1.3.1           # ← Bật khi muốn test UI đa thiết bị


dev_dependencies:
  flutter_test:
    sdk: flutter

  # ─────────────────────── CODEGEN ──────────────────────────
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.3

  json_serializable: ^6.8.0
  freezed: ^3.2.3
  injectable_generator: ^2.6.1
  retrofit_generator: ^10.2.5
  go_router_builder: ^4.3.0
  theme_tailor: ^3.0.1
  graphql_codegen: ^3.0.1

  # ─────────────────────── LINT & TEST ──────────────────────────
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3  # disabled: requires Dart >=3.10 (we're on 3.9.2)
  # Bỏ comment khi upgrade Flutter SDK lên 3.41.9+ (Dart 3.10+).
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Flavor
  flutter_flavorizr: ^2.4.1
  envied_generator: ^1.3.1
  rename: ^3.1.0


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true

  # ═══════════════════════════════════════════════════════════════
  # ASSETS
  # ═══════════════════════════════════════════════════════════════
  assets:
    # Images & Photos (PNG, JPG, WebP)
    - assets/images/

    # Icons (PNG icons - small UI elements)
    - assets/icons/

    # Lottie animations (JSON)
    - assets/lottie/

    # Fonts
    - assets/fonts/

  # ═══════════════════════════════════════════════════════════════
  # FONTS
  # ═══════════════════════════════════════════════════════════════
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/inter/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter_18pt-Bold.ttf
          weight: 700

dependency_overrides:
  test_api: 0.7.10
  matcher: 0.12.19
